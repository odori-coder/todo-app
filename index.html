<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToDo アプリ</title>
<style>
  :root {
    --bg: #ffffff;
    --card: #ffffff;
    --accent: #8b5e3c;
    --accent-hover: #74492c;
    --text: #4a3220;
    --muted: #a08e7d;
    --border: #e7ddd2;
    --done: #bcae9f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .app {
    width: 100%;
    max-width: 520px;
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 24px;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  #task-input {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 1rem;
    background: var(--card);
    outline: none;
    transition: border-color 0.15s;
  }
  #task-input:focus { border-color: var(--accent); }
  #due-input {
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.9rem;
    background: var(--card);
    color: var(--text);
    outline: none;
  }
  #due-input:focus { border-color: var(--accent); }
  #add-btn {
    padding: 0 20px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  #add-btn:hover { background: var(--accent-hover); }
  .hint {
    font-size: 0.76rem;
    color: var(--muted);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .parse-preview {
    min-height: 0;
    font-size: 0.8rem;
    color: var(--accent);
    margin-bottom: 16px;
    word-break: break-word;
  }
  .parse-preview:empty { margin-bottom: 0; }
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
  }
  .filters {
    display: flex;
    gap: 6px;
  }
  .sort-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    color: var(--muted);
  }
  #sort-select {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    font-size: 0.82rem;
    cursor: pointer;
    outline: none;
  }
  .filter-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--card);
    color: var(--muted);
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  ul { list-style: none; }
  .task {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    animation: pop 0.15s ease;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
  .task input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: var(--accent);
    flex-shrink: 0;
  }
  .task .body {
    flex: 1;
    min-width: 0;
  }
  .task .label {
    word-break: break-word;
    cursor: pointer;
  }
  .task.done .label {
    text-decoration: line-through;
    color: var(--done);
  }
  .meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .chip {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 600;
    line-height: 1.5;
  }
  .task.done .chip { opacity: 0.55; }
  .due {
    display: inline-block;
    font-size: 0.74rem;
    color: var(--muted);
  }
  .due.overdue { color: #e5484d; font-weight: 600; }
  .due.soon { color: #d98700; }
  .task.done .due { color: var(--done); font-weight: 400; }
  .delete-btn {
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 1.2rem;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .delete-btn:hover { color: #e5484d; background: #fdeced; }
  .edit-btn {
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    line-height: 1;
    padding: 4px 6px;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .edit-btn:hover { color: var(--accent); background: rgba(0, 0, 0, 0.04); }
  .task.editing { gap: 8px; }
  .edit-input {
    flex: 1;
    min-width: 0;
    padding: 8px 10px;
    border: 1px solid var(--accent);
    border-radius: 8px;
    font-size: 0.95rem;
    background: #fff;
    color: var(--text);
    outline: none;
  }
  .edit-action {
    flex-shrink: 0;
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.82rem;
    cursor: pointer;
  }
  .edit-action.save { background: var(--accent); color: #fff; }
  .edit-action.cancel { background: transparent; color: var(--muted); }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    color: var(--muted);
    font-size: 0.82rem;
  }
  #clear-done {
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.82rem;
  }
  #clear-done:hover { color: #e5484d; text-decoration: underline; }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 32px 0;
    font-size: 0.9rem;
  }
  /* ===== 認証画面 ===== */
  .auth-screen {
    width: 100%;
    max-width: 360px;
    margin: 8vh auto 0;
  }
  .auth-screen h1 { font-size: 1.8rem; }
  .auth-screen .subtitle { margin-bottom: 28px; }
  .auth-field {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 1rem;
    background: var(--card);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .auth-field:focus { border-color: var(--accent); }
  .auth-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.15s, opacity 0.15s;
  }
  .auth-btn.primary { background: var(--accent); color: #fff; }
  .auth-btn.primary:hover { background: var(--accent-hover); }
  .auth-btn.ghost {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--border);
    margin-top: 10px;
  }
  .auth-btn.ghost:hover { background: rgba(139, 94, 60, 0.06); }
  .auth-btn.google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--card);
    color: #3c4043;
    border: 1px solid var(--border);
    font-weight: 500;
  }
  .auth-btn.google:hover { background: #f7f3ee; }
  .auth-btn:disabled { opacity: 0.5; cursor: default; }
  .auth-divider {
    display: flex;
    align-items: center;
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    margin: 16px 0 12px;
  }
  .auth-divider::before, .auth-divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .auth-divider span { padding: 0 12px; }
  .auth-error {
    color: #e5484d;
    font-size: 0.82rem;
    margin: 4px 0 8px;
    min-height: 0;
    line-height: 1.5;
  }
  .auth-msg {
    color: var(--accent);
    font-size: 0.82rem;
    margin-top: 12px;
    text-align: center;
    line-height: 1.5;
  }
  /* ===== ユーザーバー ===== */
  .user-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 18px;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .user-bar .who { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .user-bar .who span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
    transition: background 0.2s;
  }
  .sync-dot.online { background: #3aa657; }
  .sync-dot.syncing { background: #d98700; }
  .sync-dot.offline { background: #bcae9f; }
  #logout-btn {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  #logout-btn:hover { color: var(--accent); border-color: var(--accent); }
  [hidden] { display: none !important; }
</style>
</head>
<body>
  <!-- ログイン画面 -->
  <div id="auth-screen" class="auth-screen" hidden>
    <h1>ToDo</h1>
    <p class="subtitle">ログインすると、どの端末からでもタスクを同期できます</p>
    <input id="auth-email" class="auth-field" type="email" placeholder="メールアドレス" autocomplete="email">
    <input id="auth-password" class="auth-field" type="password" placeholder="パスワード（6文字以上）" autocomplete="current-password">
    <div id="auth-error" class="auth-error"></div>
    <button id="login-btn" class="auth-btn primary">ログイン</button>
    <button id="signup-btn" class="auth-btn ghost">新規登録</button>
    <div class="auth-divider"><span>または</span></div>
    <button id="google-btn" class="auth-btn google">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.02-3.7H.96v2.34A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.98 10.72a5.4 5.4 0 0 1 0-3.44V4.94H.96a9 9 0 0 0 0 8.12l3.02-2.34z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 9 0 9 9 0 0 0 .96 4.94l3.02 2.34C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
      Google でログイン
    </button>
    <div id="auth-msg" class="auth-msg"></div>
  </div>

  <div class="app" hidden>
    <div id="user-bar" class="user-bar">
      <div class="who">
        <span class="sync-dot" id="sync-dot" title=""></span>
        <span id="user-email"></span>
      </div>
      <button id="logout-btn">ログアウト</button>
    </div>
    <h1>ToDo</h1>
    <p class="subtitle">タスクはクラウドに保存され、全端末で同期されます</p>

    <div class="input-row">
      <input id="task-input" type="text" placeholder="例: レポート提出 明日 仕事" autocomplete="off">
      <button id="add-btn">追加</button>
    </div>
    <p class="hint">スペース区切りで入力すると、<b>最後の単語がカテゴリー</b>になります（# は不要）。締切も文章に混ぜてOK。例: 「牛乳を買う 6/15 買い物」「掃除 来週月曜 家事」</p>
    <div id="preview" class="parse-preview"></div>

    <div class="controls">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="active">未完了</button>
        <button class="filter-btn" data-filter="done">完了</button>
      </div>
      <label class="sort-row">
        カテゴリー
        <select id="category-filter">
          <option value="all">すべて</option>
        </select>
      </label>
      <label class="sort-row">
        並び替え
        <select id="sort-select">
          <option value="created">追加順</option>
          <option value="due">締め切りが近い順</option>
          <option value="name">名前順</option>
        </select>
      </label>
    </div>

    <ul id="task-list"></ul>

    <div class="footer">
      <span id="count"></span>
      <button id="clear-done">完了タスクを削除</button>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ===== Supabase 設定 =====
  const SUPABASE_URL = "https://riqqhxrsrkirzuclqoqy.supabase.co";
  const SUPABASE_KEY = "sb_publishable_4WnVryleDgzU1InULISfPQ_3C2iC63Z";
  const sb = window.supabase
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
    : null;

  const STORAGE_KEY = "todo-app-tasks";
  const QUEUE_KEY = "todo-app-sync-queue";
  const input = document.getElementById("task-input");
  const preview = document.getElementById("preview");
  const categoryFilter = document.getElementById("category-filter");
  const sortSelect = document.getElementById("sort-select");
  const addBtn = document.getElementById("add-btn");
  const list = document.getElementById("task-list");
  const countEl = document.getElementById("count");
  const clearBtn = document.getElementById("clear-done");
  const filterBtns = document.querySelectorAll(".filter-btn");

  // 認証・同期まわりの要素
  const authScreen = document.getElementById("auth-screen");
  const appEl = document.querySelector(".app");
  const authEmail = document.getElementById("auth-email");
  const authPassword = document.getElementById("auth-password");
  const authError = document.getElementById("auth-error");
  const authMsg = document.getElementById("auth-msg");
  const loginBtn = document.getElementById("login-btn");
  const signupBtn = document.getElementById("signup-btn");
  const logoutBtn = document.getElementById("logout-btn");
  const userEmailEl = document.getElementById("user-email");
  const syncDot = document.getElementById("sync-dot");

  let tasks = load();
  let filter = "all";
  let sortBy = "created";
  let categoryFilterValue = "all";
  let editingId = null;
  let user = null; // ログイン中のユーザー（未ログインは null）

  function load() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch {
      return [];
    }
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    } catch (e) {
      console.warn("保存に失敗しました（このタブ内でのみ保持されます）", e);
    }
  }

  function fmt(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function parseDate(text) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const add = n => { const d = new Date(today); d.setDate(d.getDate() + n); return d; };
    const thisOrNextYear = (mon, day) => {
      let d = new Date(today.getFullYear(), mon - 1, day);
      if (d < today) d.setFullYear(d.getFullYear() + 1);
      return d;
    };
    const wmap = { 日: 0, 月: 1, 火: 2, 水: 3, 木: 4, 金: 5, 土: 6 };
    const dow = today.getDay();
    let m;

    if (m = text.match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/))
      return { due: fmt(new Date(+m[1], +m[2] - 1, +m[3])), matched: m[0] };

    if (m = text.match(/(\d{1,2})月(\d{1,2})日?/))
      return { due: fmt(thisOrNextYear(+m[1], +m[2])), matched: m[0] };

    if (m = text.match(/(\d+)日後/)) return { due: fmt(add(+m[1])), matched: m[0] };
    if (m = text.match(/(\d+)週間後/)) return { due: fmt(add(7 * +m[1])), matched: m[0] };

    if (m = text.match(/明後日|あさって/)) return { due: fmt(add(2)), matched: m[0] };
    if (m = text.match(/明日|あした|あす/)) return { due: fmt(add(1)), matched: m[0] };
    if (m = text.match(/今日|本日/)) return { due: fmt(add(0)), matched: m[0] };

    if (m = text.match(/来週末|今週末|週末/)) {
      let until = (6 - dow + 7) % 7;
      if (m[0] === "来週末") until += 7;
      return { due: fmt(add(until)), matched: m[0] };
    }

    if (m = text.match(/(来週)?([日月火水木金土])曜日?/)) {
      let until = (wmap[m[2]] - dow + 7) % 7;
      if (m[1]) until += 7;
      else if (until === 0) until = 7;
      return { due: fmt(add(until)), matched: m[0] };
    }

    if (m = text.match(/来週/)) return { due: fmt(add(7)), matched: m[0] };

    if (m = text.match(/(?<!\d)(\d{1,2})\/(\d{1,2})(?!\d)/))
      return { due: fmt(thisOrNextYear(+m[1], +m[2])), matched: m[0] };

    return null;
  }

  function parseInput(raw) {
    let text = " " + raw + " ";
    let category = null, due = null;

    // 明示的な #カテゴリー（任意。付ければそれを優先）
    const cm = text.match(/[#＃]([^\s#＃]+)/);
    if (cm) { category = cm[1]; text = text.replace(cm[0], " "); }

    // 締切（文章に混ぜて書ける）
    const d = parseDate(text);
    if (d) { due = d.due; text = text.replace(d.matched, " "); }

    // # が無く、語が2つ以上あれば「最後の単語」をカテゴリーにする
    const tokens = text.trim().split(/\s+/).filter(Boolean);
    if (!category && tokens.length >= 2) {
      category = tokens.pop();
    }

    const title = tokens.join(" ");
    return { title, due, category };
  }

  let idCounter = 0;
  function newId() {
    // Date.now() だけだと同一ミリ秒内で衝突するためカウンターを併用して一意化
    return Date.now() * 1000 + (idCounter++ % 1000);
  }

  function addTask(raw) {
    const parsed = parseInput(raw);
    if (!parsed.title) return;
    const t = { id: newId(), text: parsed.title, done: false, due: parsed.due, category: parsed.category };
    tasks.push(t);
    save();
    queueUpsert(t);
    render();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); queueUpsert(t); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    queueDelete(id);
    render();
  }

  function taskToInput(t) {
    let s = t.text;
    if (t.due) s += " " + t.due;
    if (t.category) s += " #" + t.category;
    return s;
  }

  function startEdit(id) {
    editingId = id;
    render();
  }

  function cancelEdit() {
    editingId = null;
    render();
  }

  function saveEdit(id, raw) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    const parsed = parseInput(raw);
    if (!parsed.title) return; // タイトルが空なら編集を続行
    t.text = parsed.title;
    t.due = parsed.due;
    t.category = parsed.category;
    editingId = null;
    save();
    queueUpsert(t);
    render();
  }

  function clearDone() {
    const removed = tasks.filter(t => t.done);
    tasks = tasks.filter(t => !t.done);
    save();
    removed.forEach(t => queueDelete(t.id));
    render();
  }

  function startOfToday() {
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    return d;
  }

  function dueInfo(due) {
    if (!due) return null;
    const date = new Date(due + "T00:00:00");
    const today = startOfToday();
    const diffDays = Math.round((date - today) / 86400000);
    let cls = "", label = `締切 ${due}`;
    if (diffDays < 0) { cls = "overdue"; label = `締切 ${due}（${-diffDays}日超過）`; }
    else if (diffDays === 0) { cls = "soon"; label = `締切 ${due}（今日）`; }
    else if (diffDays === 1) { cls = "soon"; label = `締切 ${due}（明日）`; }
    else if (diffDays <= 3) { cls = "soon"; label = `締切 ${due}（あと${diffDays}日）`; }
    return { cls, label };
  }

  function sortTasks(arr) {
    const copy = [...arr];
    if (sortBy === "due") {
      copy.sort((a, b) => {
        if (!a.due && !b.due) return a.id - b.id;
        if (!a.due) return 1;
        if (!b.due) return -1;
        return a.due.localeCompare(b.due) || a.id - b.id;
      });
    } else if (sortBy === "name") {
      copy.sort((a, b) => a.text.localeCompare(b.text, "ja"));
    } else {
      copy.sort((a, b) => a.id - b.id);
    }
    return copy;
  }

  // カテゴリーを作成順に割り当てる固定パレット
  // 1:白 2:黄色 3:薄いピンク 4:薄い水色 5:薄い緑（6個目以降は繰り返し）
  const CATEGORY_PALETTE = [
    { card: "#ffffff", bg: "#efece6", fg: "#6b5d4f", border: "#e2d9cd" },
    { card: "#fff8dd", bg: "#ffe79c", fg: "#856611", border: "#efe0a4" },
    { card: "#ffedf1", bg: "#ffc5d3", fg: "#9b3d58", border: "#f5cfd7" },
    { card: "#e7f4fb", bg: "#b3def5", fg: "#27607f", border: "#cce4f0" },
    { card: "#eaf7eb", bg: "#bce4bf", fg: "#317638", border: "#cfeacf" }
  ];

  // パレットを超えたカテゴリーは黄金角で色相を回し、自動で異なる色を生成
  function generatedColors(idx) {
    const hue = Math.round((idx * 137.508) % 360);
    return {
      card: `hsl(${hue}, 65%, 96%)`,
      bg: `hsl(${hue}, 68%, 85%)`,
      fg: `hsl(${hue}, 42%, 32%)`,
      border: `hsl(${hue}, 50%, 85%)`
    };
  }

  function categoryColors(name) {
    const order = [];
    for (const t of tasks) {
      if (t.category && !order.includes(t.category)) order.push(t.category);
    }
    const idx = order.indexOf(name);
    if (idx < 0) return CATEGORY_PALETTE[0];
    if (idx < CATEGORY_PALETTE.length) return CATEGORY_PALETTE[idx];
    // 6個目以降は自動生成（パレット外のインデックスで色相を分散）
    return generatedColors(idx);
  }

  function categories() {
    return [...new Set(tasks.map(t => t.category).filter(Boolean))]
      .sort((a, b) => a.localeCompare(b, "ja"));
  }

  function refreshCategoryControls() {
    const cats = categories();
    const current = categoryFilterValue;
    categoryFilter.innerHTML = '<option value="all">すべて</option>';
    for (const c of cats) {
      const opt = document.createElement("option");
      opt.value = c;
      opt.textContent = c;
      categoryFilter.appendChild(opt);
    }
    categoryFilter.value = cats.includes(current) ? current : "all";
    categoryFilterValue = categoryFilter.value;
  }

  function render() {
    refreshCategoryControls();
    list.innerHTML = "";
    let editInputEl = null;
    const visible = sortTasks(tasks.filter(t =>
      (filter === "all" ? true : filter === "active" ? !t.done : t.done) &&
      (categoryFilterValue === "all" ? true : t.category === categoryFilterValue)
    ));

    if (visible.length === 0) {
      const li = document.createElement("li");
      li.className = "empty";
      li.textContent = filter === "all" ? "タスクはまだありません" : "該当するタスクはありません";
      list.appendChild(li);
    }

    for (const t of visible) {
      const li = document.createElement("li");
      li.className = "task" + (t.done ? " done" : "");
      if (t.category) {
        const cc = categoryColors(t.category);
        li.style.background = cc.card;
        li.style.borderColor = cc.border;
      }

      if (t.id === editingId) {
        li.classList.add("editing");
        const ei = document.createElement("input");
        ei.type = "text";
        ei.className = "edit-input";
        ei.value = taskToInput(t);
        ei.addEventListener("keydown", e => {
          if (e.key === "Enter") saveEdit(t.id, ei.value);
          else if (e.key === "Escape") cancelEdit();
        });
        const saveBtn = document.createElement("button");
        saveBtn.className = "edit-action save";
        saveBtn.textContent = "保存";
        saveBtn.addEventListener("click", () => saveEdit(t.id, ei.value));
        const cancelBtn = document.createElement("button");
        cancelBtn.className = "edit-action cancel";
        cancelBtn.textContent = "取消";
        cancelBtn.addEventListener("click", cancelEdit);
        li.append(ei, saveBtn, cancelBtn);
        list.appendChild(li);
        editInputEl = ei;
        continue;
      }

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = t.done;
      cb.addEventListener("change", () => toggleTask(t.id));

      const body = document.createElement("div");
      body.className = "body";

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = t.text;
      label.addEventListener("click", () => toggleTask(t.id));
      body.appendChild(label);

      const info = dueInfo(t.due);
      if (t.category || info) {
        const meta = document.createElement("div");
        meta.className = "meta";

        if (t.category) {
          const chip = document.createElement("span");
          chip.className = "chip";
          const c = categoryColors(t.category);
          chip.style.background = c.bg;
          chip.style.color = c.fg;
          chip.textContent = t.category;
          meta.appendChild(chip);
        }

        if (info) {
          const due = document.createElement("span");
          due.className = "due " + info.cls;
          due.textContent = info.label;
          meta.appendChild(due);
        }

        body.appendChild(meta);
      }

      const edit = document.createElement("button");
      edit.className = "edit-btn";
      edit.textContent = "✎";
      edit.title = "編集";
      edit.addEventListener("click", () => startEdit(t.id));

      const del = document.createElement("button");
      del.className = "delete-btn";
      del.textContent = "×";
      del.title = "削除";
      del.addEventListener("click", () => deleteTask(t.id));

      li.append(cb, body, edit, del);
      list.appendChild(li);
    }

    if (editInputEl) {
      editInputEl.focus();
      const v = editInputEl.value;
      editInputEl.setSelectionRange(v.length, v.length);
    }

    const remaining = tasks.filter(t => !t.done).length;
    countEl.textContent = `未完了 ${remaining} 件 / 全 ${tasks.length} 件`;
  }

  function updatePreview() {
    if (!input.value.trim()) { preview.textContent = ""; return; }
    const p = parseInput(input.value);
    const parts = ["→ " + (p.title || "（タイトルなし）")];
    if (p.due) {
      const info = dueInfo(p.due);
      parts.push("締切 " + (info ? info.label.replace("締切 ", "") : p.due));
    }
    if (p.category) parts.push("分類 " + p.category);
    preview.textContent = parts.join("　／　");
  }

  function submit() {
    addTask(input.value);
    input.value = "";
    preview.textContent = "";
    input.focus();
  }

  addBtn.addEventListener("click", submit);

  input.addEventListener("input", updatePreview);

  input.addEventListener("keydown", e => {
    if (e.key === "Enter") submit();
  });

  sortSelect.addEventListener("change", () => {
    sortBy = sortSelect.value;
    render();
  });

  categoryFilter.addEventListener("change", () => {
    categoryFilterValue = categoryFilter.value;
    render();
  });

  clearBtn.addEventListener("click", clearDone);

  filterBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      filter = btn.dataset.filter;
      filterBtns.forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
  });

  // ================= 同期キュー =================
  // オフライン時や送信失敗時に操作を貯めておき、オンライン復帰時にまとめて送る
  function loadQueue() {
    try { return JSON.parse(localStorage.getItem(QUEUE_KEY)) || []; }
    catch { return []; }
  }
  function saveQueue(q) {
    try { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); } catch {}
  }
  function queueUpsert(t) {
    const q = loadQueue().filter(op => op.id !== t.id);
    q.push({ type: "upsert", id: t.id, data: { text: t.text, done: t.done, due: t.due, category: t.category } });
    saveQueue(q);
    flushQueue();
  }
  function queueDelete(id) {
    const q = loadQueue().filter(op => op.id !== id);
    q.push({ type: "delete", id });
    saveQueue(q);
    flushQueue();
  }

  let flushing = false;
  async function flushQueue() {
    if (!sb || !user || !navigator.onLine || flushing) return;
    flushing = true;
    setSync("syncing");
    try {
      while (loadQueue().length) {
        const op = loadQueue()[0];
        if (op.type === "upsert") {
          const { error } = await sb.from("tasks").upsert({
            id: op.id, user_id: user.id, ...op.data
          });
          if (error) throw error;
        } else if (op.type === "delete") {
          const { error } = await sb.from("tasks").delete().eq("id", op.id);
          if (error) throw error;
        }
        // 成功したら先頭を1件除去（処理中に積まれた分も保持される）
        const cur = loadQueue();
        cur.shift();
        saveQueue(cur);
      }
      setSync("online");
    } catch (e) {
      console.warn("同期に失敗しました（後で再試行します）", e);
      setSync("offline");
    } finally {
      flushing = false;
    }
  }

  // サーバーから取得してローカルを更新（サーバーを正とする）
  async function pullFromServer() {
    if (!sb || !user || !navigator.onLine) return;
    // 未送信の変更が残っているなら先に送る（取得で上書きしないため）
    if (loadQueue().length) { await flushQueue(); if (loadQueue().length) return; }
    const { data, error } = await sb.from("tasks").select("*");
    if (error) { console.warn("取得に失敗", error); setSync("offline"); return; }
    tasks = data.map(r => ({
      id: Number(r.id), text: r.text, done: r.done, due: r.due, category: r.category
    }));
    save();
    render();
    setSync("online");
  }

  // ログイン直後：ローカルにある未同期タスクをアカウントへ取り込み、その後サーバーと同期
  async function fullSync() {
    if (!sb || !user) return;
    // 現在ローカルにあるタスクをアップロード対象としてキューに積む（重複は upsert で吸収）
    const existing = loadQueue();
    const queuedIds = new Set(existing.filter(o => o.type === "upsert").map(o => o.id));
    for (const t of tasks) {
      if (!queuedIds.has(t.id)) {
        existing.push({ type: "upsert", id: t.id, data: { text: t.text, done: t.done, due: t.due, category: t.category } });
      }
    }
    saveQueue(existing);
    await flushQueue();
    await pullFromServer();
  }

  function setSync(state) {
    if (!syncDot) return;
    syncDot.className = "sync-dot " + state;
    syncDot.title = state === "online" ? "同期済み"
      : state === "syncing" ? "同期中…"
      : "オフライン（後で同期します）";
  }

  // ================= 認証 =================
  function showAuth() {
    authScreen.hidden = false;
    appEl.hidden = true;
  }
  function showApp() {
    authScreen.hidden = true;
    appEl.hidden = false;
  }

  function setAuthBusy(busy) {
    loginBtn.disabled = busy;
    signupBtn.disabled = busy;
  }

  function authErrMsg(error) {
    const m = (error && error.message) || "";
    if (/Invalid login credentials/i.test(m)) return "メールアドレスまたはパスワードが違います。";
    if (/User already registered/i.test(m)) return "このメールアドレスは登録済みです。ログインしてください。";
    if (/Password should be at least/i.test(m)) return "パスワードは6文字以上にしてください。";
    if (/Email not confirmed/i.test(m)) return "メール確認が未完了です。届いたメールのリンクを開いてください。";
    if (/valid email/i.test(m)) return "メールアドレスの形式が正しくありません。";
    return m || "エラーが発生しました。";
  }

  async function doLogin() {
    authError.textContent = ""; authMsg.textContent = "";
    const email = authEmail.value.trim();
    const password = authPassword.value;
    if (!email || !password) { authError.textContent = "メールアドレスとパスワードを入力してください。"; return; }
    setAuthBusy(true);
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setAuthBusy(false);
    if (error) { authError.textContent = authErrMsg(error); return; }
    // onAuthStateChange が後処理を行う
  }

  async function doSignup() {
    authError.textContent = ""; authMsg.textContent = "";
    const email = authEmail.value.trim();
    const password = authPassword.value;
    if (!email || !password) { authError.textContent = "メールアドレスとパスワードを入力してください。"; return; }
    if (password.length < 6) { authError.textContent = "パスワードは6文字以上にしてください。"; return; }
    setAuthBusy(true);
    const { data, error } = await sb.auth.signUp({ email, password });
    setAuthBusy(false);
    if (error) { authError.textContent = authErrMsg(error); return; }
    if (data.session) {
      authMsg.textContent = "登録しました。";
    } else {
      authMsg.textContent = "確認メールを送りました。メール内のリンクを開いてからログインしてください。";
    }
  }

  async function doGoogleLogin() {
    authError.textContent = ""; authMsg.textContent = "";
    const { error } = await sb.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: window.location.origin + window.location.pathname }
    });
    if (error) { authError.textContent = authErrMsg(error); }
    // 成功時は Google へリダイレクトされ、戻ってきたら onAuthStateChange が処理する
  }

  async function doLogout() {
    await sb.auth.signOut();
    // onAuthStateChange が画面切り替えを行う
  }

  async function onLoggedIn(sessionUser) {
    user = sessionUser;
    userEmailEl.textContent = user.email || "";
    showApp();
    setSync(navigator.onLine ? "online" : "offline");
    await fullSync();
  }

  function onLoggedOut() {
    user = null;
    tasks = [];
    save();
    saveQueue([]);
    authEmail.value = "";
    authPassword.value = "";
    authError.textContent = "";
    authMsg.textContent = "";
    render();
    showAuth();
  }

  loginBtn.addEventListener("click", doLogin);
  signupBtn.addEventListener("click", doSignup);
  document.getElementById("google-btn").addEventListener("click", doGoogleLogin);
  logoutBtn.addEventListener("click", doLogout);
  authPassword.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

  // オンライン復帰時に同期
  window.addEventListener("online", () => { setSync("syncing"); fullSync(); });
  window.addEventListener("offline", () => setSync("offline"));

  // ================= 起動 =================
  async function init() {
    render(); // まずローカルのキャッシュを表示
    if (!sb) {
      // Supabase が読み込めない場合はローカルのみで動作
      showApp();
      setSync("offline");
      return;
    }
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user) {
      await onLoggedIn(session.user);
    } else {
      onLoggedOut();
    }
    sb.auth.onAuthStateChange((event, session) => {
      if (event === "SIGNED_IN" && session && session.user) {
        if (!user || user.id !== session.user.id) onLoggedIn(session.user);
      } else if (event === "SIGNED_OUT") {
        onLoggedOut();
      }
    });

    // 他端末での変更をリアルタイム反映
    sb.channel("tasks-changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "tasks" }, () => {
        if (user && navigator.onLine && !flushing) pullFromServer();
      })
      .subscribe();
  }

  init();
</script>
</body>
